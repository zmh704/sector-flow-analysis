<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股板块资金流向分析</title>
    <script src="chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 A股板块资金流向分析</h1>
            <div class="subtitle" id="dataDate">数据加载中...</div>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="industryCount">行业显示数量:</label>
                <input type="number" id="industryCount" min="1" max="50" value="10">
            </div>
            <div class="control-group">
                <label for="conceptCount">概念显示数量:</label>
                <input type="number" id="conceptCount" min="1" max="100" value="10">
            </div>
            <button id="btnParseExcel" title="上传并解析 Excel 文件，生成板块资金流向数据" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">📊 解析数据</button>
            <button id="btnLoadData" title="从服务器重新加载所有 JSON 数据文件" style="background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);">📂 加载数据</button>
            <button id="btnRefresh" title="强制重新渲染所有组件（如显示异常时使用）" class="btn-secondary">🔄 刷新图表</button>
            <input type="file" id="excelFileInput" accept=".xlsx,.xls" style="display:none">
            <div class="control-group flow-control-group">
                <label class="flow-option inflow">
                    <input type="radio" name="flowFilter" value="inflow" checked>
                    <span>流入</span>
                </label>
                <label class="flow-option outflow">
                    <input type="radio" name="flowFilter" value="outflow">
                    <span>流出</span>
                </label>
            </div>
        </div>
        <div id="dateButtons" class="date-buttons"></div>
        <div class="leader-section" id="leaderSection">
            <div class="leader-header">🔥 今日推荐</div>
            <div class="leader-content" id="leaderContent"></div>
        </div>
        <div class="focus-section" id="focusSection">
            <div class="focus-header">📌 关注板块</div>
            <div class="focus-content" id="focusContent"></div>
        </div>
        <div id="loadStatus"></div>

        <div class="charts-container">
            <div class="chart-box">
                <div class="chart-title">
                    <span>🏛️ 行业板块资金流向</span>
                    <button class="view-all-btn" id="btnAllIndustry" title="查看所有行业板块的详细数据表格">查看全部</button>
                </div>
                <div class="chart-wrapper">
                    <canvas id="industryChart"></canvas>
                </div>
            </div>
            <div class="chart-box">
                <div class="chart-title">
                    <span>💡 概念板块资金流向</span>
                    <button class="view-all-btn" id="btnAllConcept" title="查看所有概念板块的详细数据表格">查看全部</button>
                </div>
                <div class="chart-wrapper">
                    <canvas id="conceptChart"></canvas>
                </div>
            </div>
        </div>

        <footer>
            <p>数据来源：A股成交额TOP200 | 生成时间：<span id="generateTime"></span></p>
        </footer>
    </div>

    <!-- 查看全部弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle">全部板块</h2>
                <button class="modal-close" id="btnCloseModal" title="关闭 (Esc)">✕</button>
            </div>
            <div class="modal-search">
                <input type="text" id="modalSearchInput" placeholder="🔍 搜索板块名称..." autocomplete="off">
            </div>
            <table class="modal-table">
                <thead>
                    <tr>
                        <th data-sort="name" style="width:1%;white-space:nowrap">板块 <span class="sort-arrow" id="sortArrowName">▼</span></th>
                        <th data-sort="net" style="text-align:right;width:1%;white-space:nowrap">主力净额 <span class="sort-arrow" id="sortArrowNet">▼</span></th>
                        <th data-sort="turnover" style="text-align:right;width:1%;white-space:nowrap">成交额 <span class="sort-arrow" id="sortArrowTurnover"></span></th>
                        <th data-sort="days" style="text-align:center;width:1%;white-space:nowrap">连续流入天数 <span class="sort-arrow" id="sortArrowDays"></span></th>
                        <th data-sort="count" style="text-align:right;width:1%;white-space:nowrap">股票数 <span class="sort-arrow" id="sortArrowCount"></span></th>
                        <th>涉及股票</th>
                        <th id="filterToggleTh" style="text-align:right;cursor:default" onclick="event.stopPropagation()">
                            <label style="font-weight:400;color:#666;font-size:12px;cursor:pointer" onclick="event.stopPropagation()">
                                <input type="checkbox" id="filterInvalid" checked> 过滤无效
                            </label>
                        </th>
                    </tr>
                </thead>
                <tbody id="modalBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 趋势对比弹窗 -->
    <div class="modal-overlay" id="trendModalOverlay">
        <div class="trend-modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="trend-modal-header-row">
                    <h2 id="trendModalTitle">板块</h2>
                    <div class="trend-common-stocks" id="trendMatchedSectors"></div>
                </div>
                <button class="modal-close" id="btnCloseTrendModal" title="关闭 (Esc)">✕</button>
            </div>
                <div class="trend-main-row">
                    <div class="trend-left">
                        <div class="trend-chart-tabs">
                            <button class="trend-tab-btn active" id="trendChartTabBtn">📊 板块详情</button>
                            <button class="trend-tab-btn" id="trendStockTabBtn">📈 个股详情</button>
                        </div>
                        <div class="trend-chart-content active" id="trendChartContent">
                            <div class="trend-chart-row">
                                <div class="chart-wrap">
                                    <div class="chart-label">💰 主力净额</div>
                                    <div class="chart-inner"><canvas id="trendNetChart"></canvas></div>
                                </div>
                                <div class="chart-divider"></div>
                                <div class="chart-wrap">
                                    <div class="chart-label">📊 成交额</div>
                                    <div class="chart-inner"><canvas id="trendTurnoverChart"></canvas></div>
                                </div>
                            </div>
                        </div>
                        <div class="trend-chart-content" id="trendStockContent">
                            <div class="chart-wrap" style="position:relative;min-height:300px;margin-top:10px;">
                                <iframe id="trendStockIframe" class="stock-iframe" src="about:blank" style="width:100%;height:100%;border:1px solid #e0e0e0;border-radius:8px;"></iframe>
                            </div>
                        </div>
                    </div>
                    <div class="trend-right">
                        <div class="stock-panel-header">📊 涉及股票</div>
                        <div class="stock-panel-title" id="stockPanelTitle"></div>
                        <div class="stock-panel-list" id="stockPanelList"></div>
                    </div>
                </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="calc.js"></script>
    <script src="data.js"></script>
    <script src="charts.js"></script>
    <script src="leaders.js"></script>
    <script src="modals.js"></script>
    <script src="app.js"></script>
</body>
</html>
